<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Yahan se tumhari website ka naam change ho gaya hai -->
    <title>Jishan Alam | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #070a13;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .portfolio-card {
            max-width: 450px;
            width: 100%;
            background: linear-gradient(145deg, #0b132b, #1c2541);
            border-radius: 24px;
            padding: 40px 30px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 242, 254, 0.1);
            text-align: center;
        }
        .avatar-icon {
            font-size: 4.5rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .tagline {
            color: #38bdf8;
            font-size: 1.15rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .university {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 30px;
        }
        .section-box {
            background: rgba(13, 21, 39, 0.7);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            border-left: 4px solid #00f2fe;
        }
        .section-box h2 {
            color: #00f2fe;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .section-box p {
            color: #94a3b8;
            line-height: 1.6;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="portfolio-card">
        <!-- Cool Floating Developer Avatar -->
        <div class="avatar-icon">👨‍💻</div>
        
        <!-- Premium Gradient Name -->
        <h1>Jishan Alam</h1>
        
        <!-- Details -->
        <p class="tagline">B.Tech CSE Student</p>
        <p class="university">Desh Bhagat University</p>

        <!-- Software Engineering About Section -->
        <div class="section-box">
            <h2>About Me</h2>
            <p>Hello! I am an aspiring Software Engineer and Tech Enthusiast. Passionate about coding, software architecture, and building creative web experiences. I love exploring code and turning ideas into modern digital reality.</p>
        </div>
    </div>

</body>
</html>
